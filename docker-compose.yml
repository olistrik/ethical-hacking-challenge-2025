services:
  web:
    build: ./webapp
    environment:
      DATABASE_URL: "postgres://admin:secure_password@db:5432/myapp"
    ports:
      - 8080:3000
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: myapp
    ports:
      - 5432:5432
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      # - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:


